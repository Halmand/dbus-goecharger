AccessType = OnPremise
Deviceinstance = 43
HardwareVersion = 2
AcPosition = 1
Logging = DEBUG
SignOfLifeLog = 5

[ONPREMISE]
Host = 192.168.1.222
PauseBetweenRequests = 5000

# =============================================================
# KALIBRIERUNG - Echtwerte anpassen falls noetig
# Formel: Angezeigter_Wert = Rohwert * Multiplier + Offset
# =============================================================

# Energiekalibrierung (Zählerstand in kWh)
# Angezeigte_Energie = eto/10 * EnergyMultiplier + EnergyOffset
EnergyMultiplier = 1.049
EnergyOffset = 0

# Spannungskalibrierung
# Dein Charger zeigt 211V, echte Spannung ist ~230V
# -> 211 * 1.09 ≈ 230V
VoltageOffset = 0
VoltageMultiplier = 1.09

# Stromkalibrierung (Standard = 6A, Range 6-32A je nach go-e)
# Falls die angezeigten Ampere daneben liegen:
#   Zu niedrig  -> CurrentOffset erhoehen (z.B. +0.2)
#   Zu hoch     -> CurrentOffset verringern (z.B. -0.2)
# Feinjustierung in 0.1A Schritten empfohlen
CurrentOffset = 0
CurrentMultiplier = 1.0

# Leistungskalibrierung (Gesamtleistung in Watt)
# Falls die angezeigte Leistung daneben liegt:
#   Zu niedrig  -> PowerOffset erhoehen
#   Zu hoch     -> PowerOffset verringern
# Oder wenn ein proportionaler Fehler vorliegt:
#   Zu niedrig  -> PowerMultiplier erhoehen (z.B. 1.05)
#   Zu hoch     -> PowerMultiplier verringern (z.B. 0.95)
PowerOffset = 0
PowerMultiplier = 1.049
